<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTrack | Student Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        #map { height: 500px; border-radius: 1.5rem; z-index: 10; }
        .student-dot { background: #3b82f6; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 12px rgba(59, 130, 246, 0.8); }
        .leaflet-routing-container { display: none; }
    </style>
</head>
<body class="text-slate-100 min-h-screen font-sans bg-transparent overflow-x-hidden">

<div id="background-root" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; background: #020617;"></div>

<nav class="bg-slate-900/50 backdrop-blur-md border-b border-slate-800 text-white p-4 shadow-xl flex justify-between items-center px-8 sticky top-0 z-50">
    <div class="flex items-center gap-2">
        <span class="text-2xl">🚌</span>
        <h1 class="text-xl font-bold tracking-tight text-white">SmartTrack <span class="text-indigo-400 font-medium text-sm ml-2">STUDENT CONSOLE</span></h1>
    </div>
    <button onclick="logout()" class="bg-slate-800/80 hover:bg-rose-500/20 border border-slate-700 hover:border-rose-500/50 hover:text-rose-400 px-4 py-2 rounded-lg text-sm transition">Logout</button>
</nav>

<main class="max-w-6xl mx-auto p-4 lg:p-8 space-y-6 relative z-10">
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="bg-slate-900/60 backdrop-blur-xl p-4 rounded-2xl shadow-2xl border border-slate-800 border-b-4 border-b-indigo-500 transition hover:bg-slate-800/60">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Route Code</p>
            <p id="display-route" class="text-xl font-black text-white mt-1">---</p>
        </div>
        <div class="bg-slate-900/60 backdrop-blur-xl p-4 rounded-2xl shadow-2xl border border-slate-800 border-b-4 border-b-emerald-500 transition hover:bg-slate-800/60">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Est. Arrival</p>
            <p id="display-eta" class="text-xl font-black text-emerald-400 mt-1">Calculating...</p>
        </div>
        <div class="bg-slate-900/60 backdrop-blur-xl p-4 rounded-2xl shadow-2xl border border-slate-800 border-b-4 border-b-amber-500 transition hover:bg-slate-800/60">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Driver Account</p>
            <p id="display-driver" class="text-sm font-bold text-slate-300 truncate mt-1">Loading...</p>
        </div>
        <div class="bg-slate-900/60 backdrop-blur-xl p-4 rounded-2xl shadow-2xl border border-slate-800 border-b-4 border-b-cyan-500 text-center transition hover:bg-slate-800/60">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Passengers</p>
            <p id="display-count" class="text-3xl font-black text-cyan-400">0</p>
        </div>
    </div>

    <div class="bg-slate-900/60 backdrop-blur-xl p-3 rounded-3xl shadow-2xl border border-slate-800 relative">
        <div id="map"></div>
    </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script type="module">
    import React from 'https://esm.sh/react@18';
    import ReactDOM from 'https://esm.sh/react-dom@18/client';
    import Beams from './BeamsBackground.js';

    try {
        const root = ReactDOM.createRoot(document.getElementById('background-root'));
        root.render(React.createElement(Beams));
    } catch (err) {
        console.error('Failed to mount Beams background:', err);
    }
</script>

<script>
    const token = localStorage.getItem("token");
    const schoolCoords = [28.6139, 77.2090];
    let map, busMarker, studentMarker, routingControl;

    async function startApp() {
        if (!token) window.location.href = "/login.html";

        try {
            const res = await fetch("/student/myRoute", { headers: { "Authorization": "Bearer "+token } });
            if (!res.ok) throw new Error("Failed to fetch route");
            const data = await res.json();
            if(!data || !data.routeCode) return;

            document.getElementById("display-route").innerText = data.routeCode;

            setInterval(() => updateLiveStats(data.routeCode), 5000);
            updateLiveStats(data.routeCode);
        } catch (e) {
            console.error("Error starting app:", e);
        }
    }

    async function updateLiveStats(routeCode) {
        try {
            const [locRes, etaRes, detailsRes] = await Promise.all([
                fetch(`/student/busLocation/${routeCode}`, { headers: { "Authorization": "Bearer "+token } }),
                fetch(`/student/eta/${routeCode}`, { headers: { "Authorization": "Bearer "+token } }),
                fetch(`/student/routeDetails/${routeCode}`, { headers: { "Authorization": "Bearer "+token } })
            ]);

            const loc = locRes.ok ? await locRes.json() : null;
            const eta = etaRes.ok ? await etaRes.text() : null;
            const details = detailsRes.ok ? await detailsRes.json() : {};

            if (eta) document.getElementById("display-eta").innerText = Math.round(eta) + " mins";
            document.getElementById("display-driver").innerText = details.driverEmail || "Not Assigned";
            document.getElementById("display-count").innerText = details.studentCount || 0;

            if (!loc || typeof loc.latitude === 'undefined') {
                document.getElementById("display-eta").innerText = "Waiting for GPS...";
                return; // Location not available yet
            }

            const busPos = [loc.latitude, loc.longitude];

            if (!map) {
                initMap(loc.latitude, loc.longitude);
            } else {
                if (busMarker) busMarker.setLatLng(busPos);
                drawRoadPath(busPos);
            }
        } catch (e) { console.error("Sync error:", e); }
    }

    function initMap(lat, lng) {
        map = L.map('map', { zoomControl: false }).setView([lat, lng], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        navigator.geolocation.watchPosition(p => {
            const sPos = [p.coords.latitude, p.coords.longitude];
            if (!studentMarker) {
                const iconHtml = `<div class="bg-indigo-500 w-4 h-4 rounded-full border-2 border-slate-900 shadow-[0_0_10px_#6366f1]"></div>`;
                const icon = L.divIcon({ html: iconHtml, className: 'custom-div-icon', iconSize: [16, 16], iconAnchor: [8, 8] });
                studentMarker = L.marker(sPos, { icon }).addTo(map).bindPopup("<b class='text-slate-800'>You</b>");
            } else {
                studentMarker.setLatLng(sPos);
            }
        });

        const busIconHtml = `<div class="bg-emerald-500 w-5 h-5 rounded-full border-2 border-slate-900 shadow-[0_0_15px_#10b981] flex items-center justify-center text-[10px]">🚌</div>`;
        const busIcon = L.divIcon({ html: busIconHtml, className: 'custom-div-icon', iconSize: [20, 20], iconAnchor: [10, 10] });
        busMarker = L.marker([lat, lng], { icon: busIcon }).addTo(map).bindPopup("<b class='text-slate-800'>Your Bus</b>");
        
        L.marker(schoolCoords, { icon: L.divIcon({ className: 'bg-rose-500 w-4 h-4 rounded-full border-2 border-slate-900 shadow-[0_0_10px_#f43f5e]', iconSize: [16, 16], iconAnchor: [8, 8] }) }).addTo(map).bindPopup("<b class='text-slate-800'>School</b>");

        drawRoadPath([lat, lng]);
    }

    function drawRoadPath(busPos) {
        if (routingControl) {
            map.removeControl(routingControl);
        }

        routingControl = L.Routing.control({
            waypoints: [
                L.latLng(busPos[0], busPos[1]),
                L.latLng(schoolCoords[0], schoolCoords[1])
            ],
            lineOptions: {
                styles: [{ color: '#10b981', weight: 5, opacity: 0.8 }]
            },
            createMarker: function() { return null; },
            addWaypoints: false,
            draggableWaypoints: false,
            fitSelectedRoutes: false,
            show: false
        }).addTo(map);
    }

    function logout() { localStorage.clear(); window.location.href = "/login.html"; }
    startApp();
</script>
</body>
</html>
