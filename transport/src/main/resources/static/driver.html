<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Console | SmartTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map-container {
            display: none;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            margin: 0 !important;
            border-radius: 0 !important;
            border: none !important;
            z-index: 50 !important;
            overflow: hidden;
            background: #f8fafc;
        }

        .driving-active #map-container {
            display: block !important;
            animation: slideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .driving-active #setup-ui {
            display: none !important;
        }

        .trip-btn {
            background: #10b981;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }

        .trip-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.4);
        }

        .driving-active .trip-btn {
            background: #f43f5e !important;
            box-shadow: 0 10px 15px -3px rgba(244, 63, 94, 0.4) !important;
        }

        .driving-active .trip-btn:hover {
            background: #e11d48 !important;
        }

        #telemetry-hud {
            display: none;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            z-index: 100;
            min-width: 140px;
        }

        .driving-active #telemetry-hud {
            display: block;
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
        }

        #background-root {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
            background: #020617;
        }

        #setup-ui {
            background: transparent !important;
            position: relative;
            z-index: 10;
        }

        #setup-ui main {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2.5rem;
            margin: 2rem auto;
            max-width: 420px;
            padding: 3rem 2rem;
        }

        .pulse-animation {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>

<body class="text-slate-100 min-h-screen flex flex-col font-sans overflow-x-hidden bg-transparent">

    <div id="background-root"></div>

    <div id="setup-ui" class="transition-all duration-700">
        <header
            class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 backdrop-blur-md sticky top-0 z-[1000]">
            <h1 class="text-lg font-bold tracking-tight text-white flex items-center gap-2">
                <span class="text-indigo-500">🚌</span> Driver Console
            </h1>
            <button onclick="logout()"
                class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg transition">Logout</button>
        </header>

        <main class="p-4 flex flex-col items-center space-y-6">
            <div id="status-circle"
                class="w-32 h-32 rounded-full border-4 border-slate-800 flex flex-col items-center justify-center bg-slate-900 shadow-2xl transition-all duration-500">
                <span id="status-icon" class="text-2xl mb-1">📡</span>
                <span id="status-text" class="text-[10px] uppercase font-bold tracking-widest text-slate-500">Offline</span>
            </div>

            <div class="w-full max-w-sm">
                <div class="space-y-4 mb-4">
                    <input id="routeInput" type="text" placeholder="ENTER ROUTE CODE"
                        class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-center font-mono text-xl uppercase tracking-widest text-white shadow-inner">
                    <button onclick="toggleTrip()" id="start-btn"
                        class="trip-btn w-full py-5 rounded-2xl font-black text-xl tracking-wide shadow-2xl active:scale-95 transition-all uppercase bg-emerald-500">
                        Start Trip
                    </button>
                </div>
            </div>

            <div class="w-full max-w-sm bg-slate-900/50 border border-slate-800 p-4 rounded-xl">
                <p class="text-[10px] uppercase font-bold text-slate-500 mb-2 tracking-widest">Telemetry Feed</p>
                <div id="console-log" class="font-mono text-[10px] text-slate-400 space-y-1 h-12 overflow-hidden italic">
                    Waiting for trip initiation...
                </div>
            </div>
        </main>
    </div>

    <!-- Active Navigation View -->
    <div id="map-container">
        <div id="map"></div>
        
        <!-- Map Overlays -->
        <div id="telemetry-hud">
            <div class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-2">Telemetry</div>
            <div class="space-y-2">
                <div>
                    <div class="text-[8px] text-indigo-400 font-bold uppercase">LAT</div>
                    <div id="hud-lat" class="font-mono text-lg font-bold text-white tracking-tighter">0.0000</div>
                </div>
                <div>
                    <div class="text-[8px] text-indigo-400 font-bold uppercase">LNG</div>
                    <div id="hud-lng" class="font-mono text-lg font-bold text-white tracking-tighter">0.0000</div>
                </div>
            </div>
        </div>
        
        <div class="absolute bottom-10 left-10 z-[100] pointer-events-auto">
            <button onclick="toggleTrip()" id="end-btn"
                class="trip-btn px-10 py-5 rounded-full font-black text-xl tracking-wide shadow-2xl active:scale-90 transition-all uppercase bg-rose-500">
                End Trip
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import React from 'https://esm.sh/react@18';
        import ReactDOM from 'https://esm.sh/react-dom@18/client';
        import Beams from './BeamsBackground.js';

        try {
            console.log('Mounting Beams background...');
            const root = ReactDOM.createRoot(document.getElementById('background-root'));
            root.render(React.createElement(Beams));
            console.log('Beams background mounted successfully.');
        } catch (err) {
            console.error('Failed to mount Beams background:', err);
            // Fallback background
            document.body.style.background = '#020617';
        }
    </script>
    <script>
        let isTracking = false;
        let pollTimer = null;
        let map, marker;
        const token = localStorage.getItem("token");

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([28.6139, 77.2090], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            marker = L.marker([28.6139, 77.2090]).addTo(map);
        }

        function toggleTrip() {
            const routeCode = document.getElementById("routeInput").value.trim().toUpperCase();
            if (!routeCode) return alert("Please enter a route code.");

            if (!isTracking) {
                isTracking = true;
                document.body.classList.add("driving-active");
                
                const statusCircle = document.getElementById("status-circle");
                statusCircle.classList.replace("border-slate-800", "border-green-500");
                statusCircle.classList.add("pulse-animation");
                document.getElementById("status-text").innerText = "Transmitting";

                // Initialize map when entering driving mode
                initMap();

                // Notify Leaflet that the container size has changed
                setTimeout(() => {
                    if (map) map.invalidateSize({ animate: true });
                }, 300);

                startTrackingLoop(routeCode);
            } else {
                isTracking = false;
                document.body.classList.remove("driving-active");
                clearTimeout(pollTimer);
                location.reload();
            }
        }

        function startTrackingLoop(routeCode) {
            if (!isTracking) return;

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;

                    // Update Map
                    const latlng = [latitude, longitude];
                    if (!map) initMap();
                    map.setView(latlng, 15);
                    marker.setLatLng(latlng);

                    // Send to Server
                    sendUpdate(latitude, longitude, routeCode);

                    // Recursive timeout prevents "freezing" common with watchPosition
                    pollTimer = setTimeout(() => startTrackingLoop(routeCode), 10000);
                },
                (err) => {
                    updateLog("GPS Error: " + err.message);
                    pollTimer = setTimeout(() => startTrackingLoop(routeCode), 5000);
                },
                { enableHighAccuracy: true }
            );
        }

        async function sendUpdate(lat, lng, routeCode) {
            try {
                const res = await fetch("/driver/updateLocation", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                    body: JSON.stringify({ routeCode, latitude: lat, longitude: lng })
                });
                if (res.ok) {
                    updateLog(`Sent: ${lat.toFixed(4)}, ${lng.toFixed(4)}`);
                    updateHUD(lat, lng);
                }
            } catch (err) {
                updateLog("Sync failed. Retrying...");
            }
        }

        function updateHUD(lat, lng) {
            document.getElementById("hud-lat").innerText = lat.toFixed(4);
            document.getElementById("hud-lng").innerText = lng.toFixed(4);
        }

        function updateLog(msg) {
            const log = document.getElementById("console-log");
            log.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + log.innerHTML;
        }

        function logout() { localStorage.clear(); window.location.href = "/login.html"; }
    </script>
</body>

</html>
