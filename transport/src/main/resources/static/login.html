<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transport System | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
  <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Transport Portal</h2>

  <div class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Select Role</label>
      <select id="role" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        <option value="STUDENT">Student</option>
        <option value="DRIVER">Driver</option>
        <option value="ADMIN">Admin</option>
      </select>
    </div>

    <div>
      <input id="email" type="email" placeholder="Email Address"
             class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
    </div>

    <div>
      <input id="password" type="password" placeholder="Password"
             class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
    </div>

    <p id="error-msg" class="text-red-500 text-sm hidden text-center font-semibold"></p>

    <button onclick="login()" id="login-btn"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300">
      Sign In
    </button>
  </div>
</div>

<script>
  async function login() {
      const btn = document.getElementById("login-btn");
      const errorMsg = document.getElementById("error-msg");
      const role = document.getElementById("role").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      // Simple visual loading state
      btn.innerText = "Authenticating...";
      btn.disabled = true;
      errorMsg.classList.add("hidden");

      try {
          const response = await fetch("http://localhost:8080/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ role, email, password })
          });

          const result = await response.text();

          // Check if the result is a JWT or an error message from your AuthController
          if (result.length > 50) { // Simple check to see if it's a long JWT string
              localStorage.setItem("token", result);
              localStorage.setItem("userRole", role);

              if (role === "STUDENT") window.location.href = "/map.html";
              else if (role === "DRIVER") window.location.href = "/driver.html";
              else if (role === "ADMIN") window.location.href = "/admin.html";
          } else {
              // Show the specific error from your Java code (e.g., "Incorrect role")
              errorMsg.innerText = result;
              errorMsg.classList.remove("hidden");
          }
      } catch (err) {
          errorMsg.innerText = "Server connection failed.";
          errorMsg.classList.remove("hidden");
      } finally {
          btn.innerText = "Sign In";
          btn.disabled = false;
      }
  }
</script>
</body>
</html>
